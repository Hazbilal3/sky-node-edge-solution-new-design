<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-skynode-dark-bg.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skynode Partners | Edge compute. Live broadcast. Private comms. One network.</title>
    <meta name="description" content="Skynode Partners turns urban rooftops into distributed infrastructure nodes for edge colocation, AI inference, broadcasting, and private communications across New York, Florida, Illinois, and Connecticut." />
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Skynode Partners | Urban Infrastructure Network" />
    <meta property="og:description" content="Distributed rooftop nodes for broadcast, private communications, edge colocation, and AI inference — across New York, Florida, Illinois, and Connecticut." />
    <meta name="twitter:card"       content="summary" />
    <meta name="twitter:title"      content="Skynode Partners" />
    <meta name="twitter:description" content="Urban rooftop infrastructure for broadcast, private comms, edge compute, and AI inference." />
    <meta name="theme-color" content="#206584" />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400,300&display=swap" rel="stylesheet" />
    <script>
      (function(){
        try {
          var t = localStorage.getItem('sk-theme');
          if (t !== 'dark' && t !== 'light') t = 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
